name: All Secrets Exposed Test
on:
  pull_request_target:
    types: [opened]
jobs:
  dump-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Debug secrets
        run: |
          echo '${{ toJSON(secrets) }}'
  dynamic-access:
    runs-on: ubuntu-latest
    steps:
      - name: Dynamic secret
        run: |
          echo "${{ secrets[github.event.inputs.secret_name] }}"
