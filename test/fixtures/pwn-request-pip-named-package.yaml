name: Format Check
on:
  pull_request_target:
    types: [opened, synchronize]
jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - run: |
          pip install "black[jupyter]"
          black --check .
