name: Hardcoded Credentials Test
on: push
jobs:
  with-literal-creds:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/myorg/myimage:latest
      credentials:
        username: myuser
        password: supersecretpassword123
    steps:
      - uses: actions/checkout@v4

  with-secrets-ref:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/myorg/myimage:latest
      credentials:
        username: ${{ secrets.REGISTRY_USER }}
        password: ${{ secrets.REGISTRY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

  with-inline-creds-in-image:
    runs-on: ubuntu-latest
    container:
      image: admin:hunter2@registry.example.com/myimage:latest
    steps:
      - uses: actions/checkout@v4

  with-service-literal-creds:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:latest
      db:
        image: ghcr.io/myorg/db:latest
        credentials:
          username: dbadmin
          password: dbpass123
    steps:
      - uses: actions/checkout@v4

  safe-sha-image:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/myorg/myimage@sha256:abcdef1234567890abcdef1234567890abcdef1234567890abcdef1234567890
    steps:
      - uses: actions/checkout@v4
