name: Publish CLI
on:
  workflow_dispatch:
    inputs:
      tag:
        required: true
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
      - name: Update npm
        run: npm install -g npm@11
      - name: Publish
        run: npm publish ./pkg --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
