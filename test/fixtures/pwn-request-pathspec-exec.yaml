name: Lib Deps Check Unsafe
on:
  pull_request_target:
    types: [opened]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}
      - name: Fetch PR head
        run: git fetch origin ${{ github.event.pull_request.head.sha }}
      - name: Checkout PR Lib files
        run: git checkout ${{ github.event.pull_request.head.sha }} -- Lib/
      - name: Run lib code
        run: python Lib/setup.py build
