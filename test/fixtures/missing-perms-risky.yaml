name: Missing Permissions Risky Test
on:
  pull_request_target:
    types: [opened]
jobs:
  no-perms:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - run: echo "no permissions set anywhere"
  has-perms:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - run: echo "this job has permissions"
