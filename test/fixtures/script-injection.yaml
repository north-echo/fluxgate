name: Greet PR
on:
  pull_request_target:
    types: [opened]
jobs:
  greet:
    runs-on: ubuntu-latest
    steps:
      - name: Post greeting
        run: |
          echo "Thanks for the PR: ${{ github.event.pull_request.title }}"
          echo "Description: ${{ github.event.pull_request.body }}"
