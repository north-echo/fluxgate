name: Artifact Credential Leak Test
on: push
jobs:
  upload-git-dir:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-artifact@v4
        with:
          name: repo-git
          path: .git

  upload-whole-workspace:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-artifact@v4
        with:
          name: workspace
          path: .

  upload-workspace-expr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-artifact@v4
        with:
          name: workspace
          path: ${{ github.workspace }}

  safe-persist-false:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: "false"
      - uses: actions/upload-artifact@v4
        with:
          name: workspace
          path: .

  safe-specific-path:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: dist/
