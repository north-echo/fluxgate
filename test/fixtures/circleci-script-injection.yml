version: 2.1

jobs:
  label:
    docker:
      - image: cimg/base:stable
    steps:
      - run:
          name: Print branch info
          command: |
            echo "Branch: $CIRCLE_BRANCH"
            echo "PR Author: $CIRCLE_PR_USERNAME"
  deploy:
    docker:
      - image: cimg/base:stable
    steps:
      - run:
          name: Checkout branch
          command: git checkout $CIRCLE_BRANCH

workflows:
  ci:
    jobs:
      - label
      - deploy
