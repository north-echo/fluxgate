name: Static Literal Keys Test
on:
  issue_comment:
    types: [created]
jobs:
  publish-images:
    runs-on: ubuntu-latest
    steps:
      - name: Login (single-quoted literal key — equivalent to secrets.REGISTRY_USER)
        run: |
          docker login \
            -u ${{ secrets['REGISTRY_USER'] }} \
            -p ${{ secrets['REGISTRY_PASSWORD'] }}
      - name: Skopeo copy (double-quoted literal key)
        run: |
          skopeo copy --src-creds ${{ secrets["pcUser"] }}:${{ secrets["pcPassword"] }} src dst
      - name: Mixed in env
        env:
          U: ${{ secrets['REGISTRY_USER'] }}
          P: ${{ secrets['REGISTRY_PASSWORD'] }}
        run: docker push image
